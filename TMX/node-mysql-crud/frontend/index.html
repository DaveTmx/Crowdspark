<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Science Fair Projects &mdash; Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #667eea;
      background-image: url('https://www.transparenttextures.com/patterns/asfalt-light.png');
      min-height: 100vh;
      padding: 30px 20px;
    }

    .wrapper {
      max-width: 1100px;
      margin: 0 auto;
    }

    h1 {
      color: white;
      text-align: center;
      font-size: 2em;
      margin-bottom: 24px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 28px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      margin-bottom: 24px;
    }

    .card h2 {
      color: #667eea;
      font-size: 1.3em;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #667eea;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .form-grid .full-width { grid-column: 1 / -1; }

    label {
      display: block;
      font-size: 0.85em;
      font-weight: 600;
      color: #555;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    input, textarea, select {
      width: 100%;
      padding: 10px 12px;
      border: 2px solid #e9ecef;
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
    }
    textarea { resize: vertical; }

    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 18px;
    }

    button {
      padding: 11px 24px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary   { background: #667eea; color: white; }
    .btn-primary:hover   { background: #764ba2; transform: translateY(-1px); }
    .btn-secondary { background: #6c757d; color: white; display: none; }
    .btn-secondary:hover { background: #545b62; }

    #form-message {
      display: none;
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.95em;
    }
    .msg-success { background: #d4edda; color: #155724; }
    .msg-error   { background: #f8d7da; color: #721c24; }

    /* Table */
    .table-wrapper { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead th {
      background: #667eea;
      color: white;
      padding: 12px 14px;
      text-align: left;
      font-size: 0.85em;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    tbody td {
      padding: 11px 14px;
      border-bottom: 1px solid #e9ecef;
      color: #333;
      vertical-align: top;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #f8f9fa; }

    .action-cell { white-space: nowrap; }
    .btn-edit   { background: #007bff; color: white; padding: 6px 14px; font-size: 13px; margin-right: 6px; }
    .btn-edit:hover   { background: #0056b3; }
    .btn-delete { background: #dc3545; color: white; padding: 6px 14px; font-size: 13px; }
    .btn-delete:hover { background: #a71d2a; }

    #loading { text-align: center; color: #667eea; padding: 20px; font-weight: 600; }

    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-grid .full-width { grid-column: 1; }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <h1>&#x1F52C; Science Fair Projects &mdash; Admin Panel</h1>

    <!-- Form card -->
    <div class="card">
      <h2 id="form-heading">Add New Project</h2>
      <form id="crud-form">
        <input type="hidden" id="project-id">
        <div class="form-grid">
          <div>
            <label for="project_title">Project Title *</label>
            <input type="text" id="project_title" required maxlength="200">
          </div>
          <div>
            <label for="student_name">Student Name</label>
            <input type="text" id="student_name" maxlength="150">
          </div>
          <div>
            <label for="category">Category *</label>
            <input type="text" id="category" required maxlength="50">
          </div>
          <div>
            <label for="supervisor">Supervisor</label>
            <input type="text" id="supervisor" maxlength="150">
          </div>
          <div>
            <label for="grade_level">Grade Level</label>
            <input type="number" id="grade_level" min="9" max="12">
          </div>
          <div>
            <label for="judges_score">Judges Score (0&ndash;100)</label>
            <input type="number" id="judges_score" step="0.01" min="0" max="100">
          </div>
          <div class="full-width">
            <label for="abstract">Abstract</label>
            <textarea id="abstract" rows="3"></textarea>
          </div>
        </div>
        <p id="form-message"></p>
        <div class="btn-row">
          <button type="submit" class="btn-primary" id="submit-button">Create Project</button>
          <button type="button" class="btn-secondary" id="cancel-button">Cancel Edit</button>
        </div>
      </form>
    </div>

    <!-- Table card -->
    <div class="card">
      <h2>Existing Projects</h2>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Title</th>
              <th>Student</th>
              <th>Category</th>
              <th>Grade</th>
              <th>Score</th>
              <th>Supervisor</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="projects-table-body">
            <tr><td colspan="8" id="loading">Loading projects&hellip;</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
